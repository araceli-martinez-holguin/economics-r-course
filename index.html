<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Economics R Course</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy:    #0a1628;
      --deep:    #0d2147;
      --mid:     #1a3a6e;
      --accent:  #2e6bc4;
      --bright:  #5b9cf6;
      --ice:     #a8c8f8;
      --frost:   #ddeeff;
      --white:   #f0f6ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--navy);
      color: var(--white);
      font-family: 'Source Sans 3', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(46,107,196,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(13,33,71,0.6) 0%, transparent 60%),
        radial-gradient(ellipse at 60% 10%, rgba(91,156,246,0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 60px 32px 80px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 64px;
      animation: fadeDown 0.7s ease both;
    }

    .eyebrow {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--bright);
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      font-weight: 700;
      line-height: 1.15;
      background: linear-gradient(135deg, var(--white) 30%, var(--ice));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }

    .divider {
      width: 64px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--bright));
      margin: 0 auto;
      border-radius: 2px;
    }

    /* Section title */
    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ice);
      margin-bottom: 20px;
      opacity: 0.7;
    }

    /* Cards */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
    }

    .card {
      background: linear-gradient(135deg, rgba(26,58,110,0.6), rgba(13,33,71,0.8));
      border: 1px solid rgba(91,156,246,0.2);
      border-radius: 16px;
      padding: 28px 28px 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      animation: fadeUp 0.6s ease both;
      backdrop-filter: blur(8px);
    }

    .card:nth-child(1) { animation-delay: 0.15s; }
    .card:nth-child(2) { animation-delay: 0.25s; }
    .card:nth-child(3) { animation-delay: 0.35s; }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(91,156,246,0.55);
      box-shadow: 0 16px 40px rgba(10,22,40,0.5), 0 0 0 1px rgba(91,156,246,0.15);
    }

    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--bright));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(46,107,196,0.4);
    }

    .card-body { flex: 1; }

    .card-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--bright);
      margin-bottom: 4px;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--white);
      margin-bottom: 4px;
    }

    .card-sub {
      font-size: 0.82rem;
      color: var(--ice);
      opacity: 0.7;
    }

    .card-arrow {
      font-size: 1.1rem;
      color: var(--bright);
      opacity: 0.5;
      transition: opacity 0.2s, transform 0.2s;
    }

    .card:hover .card-arrow {
      opacity: 1;
      transform: translateX(4px);
    }

    /* README single card */
    .readme-card {
      background: linear-gradient(135deg, rgba(46,107,196,0.18), rgba(13,33,71,0.7));
      border-color: rgba(91,156,246,0.3);
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 64px;
      font-size: 0.78rem;
      color: var(--ice);
      opacity: 0.4;
      letter-spacing: 0.05em;
      animation: fadeUp 0.8s 0.5s ease both;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <p class="eyebrow">UNAM · Department of Economics</p>
      <h1>Economics R Course</h1>
      <div class="divider"></div>
    </header>

    <p class="section-title">Laboratories</p>
    <div class="card-grid">
      <a class="card" href="Laboratories/Laboratory-0/Laboratory-0.html">
        <div class="card-icon">🔬</div>
        <div class="card-body">
          <div class="card-label">Lab 00</div>
          <div class="card-title">Laboratory 0</div>
          <div class="card-sub">Types of objects in R</div>
        </div>
        <span class="card-arrow">→</span>
      </a>

      <a class="card" href="Laboratories/Laboratory-1/Laboratory-1.html">
        <div class="card-icon">📊</div>
        <div class="card-body">
          <div class="card-label">Lab 01</div>
          <div class="card-title">Laboratory 1</div>
          <div class="card-sub">Data structures & analysis</div>
        </div>
        <span class="card-arrow">→</span>
      </a>
    </div>

    <p class="section-title">Documentation</p>
    <div class="card-grid">
      <a class="card readme-card" href="README.md">
        <div class="card-icon">📄</div>
        <div class="card-body">
          <div class="card-label">Docs</div>
          <div class="card-title">README</div>
          <div class="card-sub">Course overview & instructions</div>
        </div>
        <span class="card-arrow">→</span>
      </a>
    </div>

    <footer>
      araceli-martinez-holguin · economics-r-course · GitHub Pages
    </footer>

  </div>
</body>
</html>
